<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Untitled Story</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Georgia', serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #e8e8e8;
      line-height: 1.8;
    }
    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 60px 24px;
    }
    h1 {
      font-size: 2.5rem;
      text-align: center;
      margin-bottom: 48px;
      font-weight: 400;
      letter-spacing: 0.05em;
      color: #f0c674;
    }
    .passage {
      margin-bottom: 24px;
      animation: fadeIn 0.5s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .passage-title {
      font-size: 1.4rem;
      color: #f0c674;
      margin-bottom: 12px;
      font-weight: 400;
    }
    .passage-text {
      font-size: 1.15rem;
      color: #d4d4d4;
    }
    .choices {
      margin-top: 32px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .choice-btn {
      background: rgba(122, 162, 247, 0.1);
      border: 1px solid rgba(122, 162, 247, 0.3);
      color: #7aa2f7;
      padding: 16px 24px;
      font-size: 1.05rem;
      font-family: inherit;
      cursor: pointer;
      border-radius: 8px;
      text-align: left;
      transition: all 0.2s ease;
    }
    .choice-btn:hover {
      background: rgba(122, 162, 247, 0.2);
      border-color: #7aa2f7;
      transform: translateX(4px);
    }
    .choice-btn.chosen {
      background: rgba(122, 162, 247, 0.2);
      border-color: #7aa2f7;
      color: #b4d0fb;
      cursor: default;
      font-style: italic;
    }
    .choice-btn.chosen:hover {
      transform: none;
    }
    .choice-btn.unchosen {
      opacity: 0.3;
      cursor: default;
      border-color: rgba(122, 162, 247, 0.15);
    }
    .choice-btn.unchosen:hover {
      transform: none;
      background: rgba(122, 162, 247, 0.1);
      border-color: rgba(122, 162, 247, 0.15);
    }
    .end {
      text-align: center;
      padding: 48px 0;
      color: #f0c674;
      font-size: 1.3rem;
    }
    .restart-btn {
      background: #f0c674;
      color: #1a1a2e;
      border: none;
      padding: 12px 32px;
      font-size: 1rem;
      font-family: inherit;
      cursor: pointer;
      border-radius: 24px;
      margin-top: 24px;
      transition: transform 0.2s ease;
    }
    .restart-btn:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Untitled Story</h1>
    <div id="story"></div>
  </div>
  <script>
    const scenes = [{"id":"1772306376986","title":"Opening Scene","content":"You fart. Do you...","choices":[{"id":"1772306387047","text":"Run?","targetSceneId":"1772306417962"},{"id":"1772306436277","text":"Stay and experience?","targetSceneId":"1772306457529"}],"position":{"x":189.15900109364898,"y":106.50211364808295},"isStart":true,"isEnding":false},{"id":"1772306417962","title":"Run!","content":"You run and fart again. Do you...","choices":[{"id":"1772306428086","text":"Run?","targetSceneId":"1772306487016"},{"id":"1772306472016","text":"Run really fast?","targetSceneId":"1772306497084"}],"position":{"x":111.02913896815714,"y":261.7093870924465},"isStart":false,"isEnding":false},{"id":"1772306457529","title":"Stay and experience","content":"While smelling the terrible fart, you fart again. ","choices":[],"position":{"x":248.0007718996761,"y":152.23825917294798},"isStart":false,"isEnding":false},{"id":"1772306487016","title":"Run again","content":"","choices":[],"position":{"x":259.5266302116954,"y":126.25922671144359},"isStart":false,"isEnding":false},{"id":"1772306497084","title":"Run reallky fast","content":"","choices":[],"position":{"x":126.01466349449318,"y":111.37542798371207},"isStart":false,"isEnding":false}];
    let currentScene = scenes.find(s => s.isStart) || scenes[0];
    let history = [];

    function fmt(t) { return t ? t.replace(/\*([^*]+)\*/g, '<em>$1</em>') : ''; }

    function render() {
      const container = document.getElementById('story');
      let html = '';

      history.forEach(item => {
        html += '<div class="passage">';
        if (item.title) html += '<h2 class="passage-title">' + item.title + '</h2>';
        html += '<p class="passage-text">' + fmt(item.text) + '</p>';
        html += '</div>';

        // Show all choices for this beat, with chosen highlighted and unchosen faded
        if (item.choices && item.choices.length > 0) {
          html += '<div class="choices">';
          item.choices.forEach(function(c) {
            if (c.id === item.chosenId) {
              html += '<div class="choice-btn chosen">▸ ' + c.text + '</div>';
            } else {
              html += '<div class="choice-btn unchosen">' + c.text + '</div>';
            }
          });
          html += '</div>';
        }
      });

      html += '<div class="passage">';
      if (currentScene.title) html += '<h2 class="passage-title">' + currentScene.title + '</h2>';
      html += '<p class="passage-text">' + fmt(currentScene.content) + '</p>';
      html += '</div>';

      var validChoices = currentScene.choices.filter(function(c) { return c.targetSceneId; });
      if (currentScene.isEnding || validChoices.length === 0) {
        html += '<div class="end"><p>— The End —</p>';
        html += '<button class="restart-btn" onclick="restart()">Play Again</button></div>';
      } else {
        html += '<div class="choices">';
        validChoices.forEach(function(choice) {
          html += '<button class="choice-btn" onclick="choose(\'' + choice.id + '\')">' + choice.text + '</button>';
        });
        html += '</div>';
      }

      container.innerHTML = html;
      window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function choose(choiceId) {
      var validChoices = currentScene.choices.filter(function(c) { return c.targetSceneId; });
      var choice = validChoices.find(function(c) { return c.id === choiceId; });
      if (!choice) return;

      history.push({
        title: currentScene.title,
        text: currentScene.content,
        choices: validChoices,
        chosenId: choiceId
      });

      currentScene = scenes.find(function(s) { return s.id === choice.targetSceneId; });
      render();
    }

    function restart() {
      currentScene = scenes.find(function(s) { return s.isStart; }) || scenes[0];
      history = [];
      render();
    }

    render();
  </script>
</body>
</html>
